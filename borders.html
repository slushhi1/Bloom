<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borders — Republic of Bloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --purple-rich: #7040b0;
      --white:       #f4f2f7;
      --gray-light:  #b8b4c2;
      --chrome:      #a8a4b8;
      --chrome-light:#d8d5de;
      --gold:        #b89a3a;
      --border:      rgba(112,64,176,0.26);
    }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Jost',sans-serif; color:var(--white); background:#0d0520; }

    /* HEADER */
    header { position:fixed; top:0; left:0; right:0; z-index:200; background:rgba(13,5,32,0.9); backdrop-filter:blur(22px); border-bottom:1px solid var(--border); }
    .header-inner { max-width:1200px; margin:0 auto; padding:0 2.5rem; display:flex; align-items:center; height:72px; gap:1.5rem; }
    .flag-stripe { display:flex; gap:3px; align-items:center; flex-shrink:0; }
    .flag-stripe span { display:block; width:5px; height:30px; }
    .flag-stripe .s1 { background:var(--purple-rich); }
    .flag-stripe .s2 { background:#eeecf3; }
    .flag-stripe .s3 { background:#555; }
    .site-title { font-family:'Cinzel',serif; font-size:0.82rem; letter-spacing:0.24em; color:var(--chrome-light); text-decoration:none; white-space:nowrap; }
    .header-nav { display:flex; list-style:none; margin-left:auto; }
    .header-nav a { display:block; padding:0 1.05rem; height:72px; line-height:72px; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; color:var(--chrome-light); text-decoration:none; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s,background 0.2s; }
    .header-nav a:hover,.header-nav a.active { color:var(--white); border-bottom-color:var(--purple-rich); background:rgba(112,64,176,0.09); }
    .nav-dropdown { position:relative; }
    .nav-dropdown-btn { display:flex; align-items:center; gap:0.4rem; padding:0 1.05rem; height:72px; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; color:var(--chrome-light); cursor:pointer; background:none; border:none; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s,background 0.2s; white-space:nowrap; }
    .nav-dropdown-btn:hover,.nav-dropdown.open .nav-dropdown-btn { color:var(--white); border-bottom-color:var(--purple-rich); background:rgba(112,64,176,0.09); }
    .nav-dropdown-btn svg { width:8px; height:8px; fill:currentColor; transition:transform 0.2s; }
    .nav-dropdown.open .nav-dropdown-btn svg { transform:rotate(180deg); }
    .nav-dropdown-menu { position:absolute; top:100%; right:0; background:rgba(20,8,45,0.97); backdrop-filter:blur(22px); border:1px solid var(--border); border-top:none; min-width:210px; display:none; z-index:300; }
    .nav-dropdown.open .nav-dropdown-menu { display:block; }
    .nav-dropdown-menu a { display:block; padding:0.9rem 1.25rem; font-family:'Cinzel',serif; font-size:0.63rem; letter-spacing:0.12em; color:var(--chrome-light); text-decoration:none; border-bottom:1px solid var(--border); transition:color 0.2s,background 0.2s; }
    .nav-dropdown-menu a:last-child { border-bottom:none; }
    .nav-dropdown-menu a:hover { color:var(--white); background:rgba(112,64,176,0.12); }
    .discord-pill { display:flex; align-items:center; gap:0.45rem; padding:0.38rem 0.9rem; background:rgba(88,101,242,0.14); border:1px solid rgba(88,101,242,0.32); text-decoration:none; font-family:'Cinzel',serif; font-size:0.51rem; letter-spacing:0.17em; color:#a0aaee; white-space:nowrap; transition:all 0.2s; flex-shrink:0; margin-left:0.5rem; }
    .discord-pill:hover { background:rgba(88,101,242,0.28); border-color:rgba(88,101,242,0.6); color:#c8d0ff; }
    .discord-pill svg { width:12px; height:12px; fill:currentColor; }
    .nav-toggle { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; margin-left:auto; }
    .nav-toggle span { display:block; width:20px; height:1.5px; background:var(--gray-light); }

    /* MAP — full screen below header */
    #bloom-map {
      position:fixed;
      top:72px;
      left:0; right:0; bottom:0;
      z-index:1;
      background:#06030f;
    }

    /* MAP CONTROLS */
    .map-nav-btns {
      position:fixed;
      top:calc(72px + 1rem);
      left:1rem;
      z-index:100;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
    }

    .map-nav-btn {
      background:rgba(10,5,22,0.88);
      border:1px solid rgba(112,64,176,0.35);
      color:#b8b4c2;
      font-family:'Cinzel',serif;
      font-size:0.6rem;
      letter-spacing:0.18em;
      padding:0.7rem 1.6rem;
      cursor:pointer;
      transition:all 0.2s;
      display:flex;
      align-items:center;
      gap:0.6rem;
      min-width:140px;
      backdrop-filter:blur(12px);
    }
    .map-nav-btn::before { content:''; display:block; width:5px; height:5px; border-radius:50%; background:rgba(112,64,176,0.4); flex-shrink:0; transition:background 0.2s; }
    .map-nav-btn:hover { border-color:rgba(112,64,176,0.7); color:var(--white); background:rgba(112,64,176,0.15); }
    .map-nav-btn:hover::before { background:var(--purple-rich); }
    .map-nav-btn.active { border-color:var(--purple-rich); color:var(--white); background:rgba(112,64,176,0.2); }
    .map-nav-btn.active::before { background:var(--purple-rich); box-shadow:0 0 6px rgba(112,64,176,0.8); }

    .claims-toggle {
      position:fixed;
      bottom:1.5rem;
      right:1rem;
      z-index:100;
      background:rgba(10,5,22,0.88);
      border:1px solid rgba(112,64,176,0.4);
      color:#b8b4c2;
      font-family:'Cinzel',serif;
      font-size:0.52rem;
      letter-spacing:0.18em;
      padding:0.5rem 1rem;
      cursor:pointer;
      transition:all 0.2s;
      backdrop-filter:blur(12px);
    }
    .claims-toggle:hover { border-color:var(--purple-rich); color:var(--white); }
    .claims-toggle.active { background:rgba(112,64,176,0.25); border-color:var(--purple-rich); color:var(--white); }

    /* PAGE LABEL */
    .map-label {
      position:fixed;
      bottom:1.5rem;
      left:1rem;
      z-index:100;
      font-family:'Cinzel',serif;
      font-size:0.48rem;
      letter-spacing:0.32em;
      color:rgba(168,164,184,0.5);
    }

    /* Leaflet tooltip */
    .bloom-tooltip {
      background:rgba(10,5,22,0.88);
      border:1px solid rgba(112,64,176,0.4);
      color:#d8d5de;
      font-family:'Cinzel',serif;
      font-size:0.55rem;
      letter-spacing:0.14em;
      padding:4px 10px;
      border-radius:0;
      box-shadow:none;
    }
    .bloom-tooltip::before { display:none; }

    /* DRAWER */
    .drawer { position:fixed; top:0; right:-100%; width:230px; height:100%; background:rgba(13,5,32,0.97); backdrop-filter:blur(24px); z-index:300; padding:4.5rem 1.75rem 2rem; border-left:1px solid var(--border); transition:right 0.3s ease; }
    .drawer.open { right:0; }
    .drawer ul { list-style:none; }
    .drawer li { border-bottom:1px solid var(--border); }
    .drawer a { display:block; padding:0.9rem 0; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.18em; color:var(--gray-light); text-decoration:none; transition:color 0.2s; }
    .drawer a:hover { color:var(--white); }
    .drawer-close { position:absolute; top:1.1rem; right:1.1rem; background:none; border:none; color:var(--gray-light); font-size:1.1rem; cursor:pointer; padding:4px; }
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:250; display:none; }
    .drawer-overlay.on { display:block; }

    @media (max-width:940px) {
      .header-nav { display:none; }
      .discord-pill { display:none; }
      .nav-toggle { display:flex; }
    }
    @media (max-width:600px) {
      .header-inner { padding:0 1.25rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="flag-stripe" aria-hidden="true">
      <span class="s1"></span><span class="s2"></span><span class="s3"></span>
    </div>
    <a href="index.html" class="site-title">BLOOM</a>
    <ul class="header-nav">
      <li><a href="join.html">Residency</a></li>
      <li><a href="guide.html">New Player Guide</a></li>
      <li><a href="government.html">Government</a></li>
      <li class="nav-dropdown" id="resourcesDropdown">
        <button class="nav-dropdown-btn active" id="resourcesBtn">
          Additional Resources
          <svg viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z"/></svg>
        </button>
        <div class="nav-dropdown-menu">
          <a href="rails.html">Rails</a>
          <a href="farms.html">Farms</a>
          <a href="craigslist.html">☮ Craigslist</a>
          <a href="borders.html">Borders</a>
        </div>
      </li>
    </ul>
    <a href="https://discord.gg/aV6VM32EZR" target="_blank" class="discord-pill">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      DISCORD
    </a>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- Mobile drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">&#x2715;</button>
  <ul>
    <li><a href="join.html">Residency</a></li>
    <li><a href="guide.html">New Player Guide</a></li>
    <li><a href="government.html">Government</a></li>
    <li><a href="rails.html">Rails</a></li>
    <li><a href="farms.html">Farms</a></li>
    <li><a href="craigslist.html">☮ Craigslist</a></li>
    <li><a href="borders.html">Borders</a></li>
    <li><a href="https://discord.gg/aV6VM32EZR" target="_blank" style="color:#a0aaee;">Join Discord</a></li>
  </ul>
</div>

<!-- MAP CONTROLS -->
<div class="map-nav-btns">
  <button id="btn-mainland" class="map-nav-btn active">Mainland</button>
  <button id="btn-cane" class="map-nav-btn">Cane Corp</button>
</div>

<button id="claims-toggle" class="claims-toggle active">Claims: On</button>
<div class="map-label">REPUBLIC OF BLOOM &nbsp;&middot;&nbsp; CIVMC</div>

<!-- MAP -->
<div id="bloom-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  /* Nav */
  const toggle = document.getElementById('navToggle');
  const drawer = document.getElementById('drawer');
  const drawerOverlay = document.getElementById('drawerOverlay');
  const closeBtn = document.getElementById('drawerClose');
  const openD = () => { drawer.classList.add('open'); drawerOverlay.classList.add('on'); document.body.style.overflow='hidden'; };
  const closeD = () => { drawer.classList.remove('open'); drawerOverlay.classList.remove('on'); document.body.style.overflow=''; };
  toggle.addEventListener('click', openD);
  drawerOverlay.addEventListener('click', closeD);
  closeBtn.addEventListener('click', closeD);
  drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', closeD));

  const rd = document.getElementById('resourcesDropdown');
  const rb = document.getElementById('resourcesBtn');
  rb.addEventListener('click', e => { e.stopPropagation(); rd.classList.toggle('open'); });
  document.addEventListener('click', () => rd.classList.remove('open'));

  /* Map */
  function mc(x, z) { return [-z, x]; }

  const map = L.map('bloom-map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 0,
    zoomSnap: 0.5,
    zoomDelta: 0.5,
    attributionControl: false
  });

  const CivTiles = L.TileLayer.extend({
    getTileUrl: function(coords) {
      return `https://civmc-map.duckdns.org/tiles/terrain/z${coords.z}/${coords.x},${coords.y}.png`;
    }
  });

  new CivTiles('', {
    minZoom: -5, maxZoom: 0,
    tileSize: 256, noWrap: true,
    errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
  }).addTo(map);

  map.setView(mc(-4150, -6800), -2.5);

  const bloomIcon = L.divIcon({
    className: '',
    html: `<div style="width:12px;height:12px;background:#7040b0;border:2px solid #d8d5de;border-radius:50%;box-shadow:0 0 8px rgba(112,64,176,0.8);"></div>`,
    iconSize: [12, 12], iconAnchor: [6, 6]
  });

  L.marker(mc(-4150, -5800), { icon: bloomIcon })
    .addTo(map)
    .bindTooltip('Republic of Bloom', { permanent: true, direction: 'top', offset: [0, -10], className: 'bloom-tooltip' });

  L.control.attribution({ prefix: '<a href="https://civmc-map.github.io" target="_blank">CivMC Map</a>' }).addTo(map);

  const territoryBounds = [mc(-10830, -10830), mc(10830, 10830)];
  const territoryOverlay = L.imageOverlay(
    'https://slushhi1.github.io/civmc-map.github.io/CivMCMap44Transparent.png',
    territoryBounds, { opacity: 0.7, interactive: false }
  );

  let overlayOn = true;
  territoryOverlay.addTo(map);

  const toggleBtn = document.getElementById('claims-toggle');
  toggleBtn.addEventListener('click', () => {
    overlayOn = !overlayOn;
    if (overlayOn) { territoryOverlay.addTo(map); toggleBtn.classList.add('active'); toggleBtn.textContent = 'Claims: On'; }
    else { map.removeLayer(territoryOverlay); toggleBtn.classList.remove('active'); toggleBtn.textContent = 'Claims: Off'; }
  });

  const btnMainland = document.getElementById('btn-mainland');
  const btnCane = document.getElementById('btn-cane');
  btnMainland.addEventListener('click', () => {
    map.flyTo(mc(-4150, -6800), -2.5, { duration: 0.8 });
    btnMainland.classList.add('active'); btnCane.classList.remove('active');
  });
  btnCane.addEventListener('click', () => {
    map.flyTo(mc(-3070, -810), -2, { duration: 0.8 });
    btnCane.classList.add('active'); btnMainland.classList.remove('active');
  });

  setTimeout(() => { map.invalidateSize(); map.setView(mc(-4150, -6800), -2.5); }, 200);
</script>
</body>
</html>
