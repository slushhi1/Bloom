<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>craigslist — bloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:  #5c2d91;
      --link:    #4a1a8a;
      --link-visited: #800080;
      --gray:    #666;
      --border:  #ccc;
      --bg:      #fff;
      --bg-alt:  #f5f5f5;
      --green:   #4a7c59;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', Arial, sans-serif;
      font-size: 13px;
      color: #333;
      background: var(--bg);
      min-height: 100vh;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:visited { color: var(--link-visited); }

    /* ─── HEADER ─── */
    .cl-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .cl-logo {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--purple);
      letter-spacing: 0.02em;
      text-decoration: none;
    }
    .cl-logo:hover { text-decoration: none; }
    .cl-logo span { color: #999; font-size: 0.7rem; font-family: Arial, sans-serif; display: block; letter-spacing: 0; font-weight: 400; margin-top: -4px; }

    .cl-header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
    }

    .cl-header-right a {
      color: var(--gray);
      font-size: 0.75rem;
    }

    .back-link {
      font-size: 0.75rem;
      color: var(--gray);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
    }

    /* ─── LAYOUT ─── */
    .cl-body {
      max-width: 700px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* ─── LOCATION BAR ─── */
    .cl-location {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--gray);
    }

    .cl-location strong {
      color: var(--purple);
      font-weight: 500;
    }

    /* ─── SEARCH + FILTER ─── */
    .cl-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .cl-search {
      border: 1px solid var(--border);
      padding: 0.3rem 0.6rem;
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      flex: 1;
      min-width: 160px;
      outline: none;
    }
    .cl-search:focus { border-color: var(--purple); }

    .cl-filter-btns {
      display: flex;
      gap: 0;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.3rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--link);
      margin-left: -1px;
      transition: background 0.1s;
    }
    .filter-btn:first-child { margin-left: 0; }
    .filter-btn:hover { background: var(--bg-alt); }
    .filter-btn.active {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
      z-index: 1;
    }

    /* ─── LISTINGS ─── */
    .cl-section-title {
      font-size: 0.72rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3rem;
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
    }

    .cl-listings {
      display: flex;
      flex-direction: column;
    }

    .cl-listing {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0.25rem;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.1s;
    }
    .cl-listing:hover { background: #f9f7ff; }

    .cl-listing-thumb {
      width: 64px;
      height: 48px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 0.65rem;
    }

    .cl-listing-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cl-listing-info { flex: 1; min-width: 0; }

    .cl-listing-title {
      color: var(--link);
      font-size: 0.88rem;
      line-height: 1.3;
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cl-listing:hover .cl-listing-title { text-decoration: underline; }

    .cl-listing-meta {
      font-size: 0.72rem;
      color: var(--gray);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .cl-listing-tag {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      padding: 0.05rem 0.4rem;
      font-size: 0.68rem;
      color: var(--gray);
    }

    .cl-listing-tag.jobs { border-color: #a0c4a8; color: var(--green); background: #f0f7f1; }
    .cl-listing-tag.properties { border-color: #a0b4c4; color: #2a5a8a; background: #f0f4f7; }

    .cl-listing-date { color: #999; font-size: 0.68rem; }
    .cl-listing-author { color: #888; }

    /* ─── MODAL ─── */
    .cl-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .cl-modal-overlay.open { display: flex; }

    .cl-modal {
      background: var(--bg);
      border: 1px solid var(--border);
      max-width: 680px;
      width: 100%;
      padding: 1.5rem;
      position: relative;
    }

    .cl-modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--gray);
      line-height: 1;
    }
    .cl-modal-close:hover { color: #333; }

    .cl-modal-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray);
      margin-bottom: 0.5rem;
    }

    .cl-modal-title {
      font-size: 1.25rem;
      color: #222;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .cl-modal-meta {
      font-size: 0.78rem;
      color: var(--gray);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .cl-modal-img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .cl-modal-body {
      font-size: 0.88rem;
      color: #333;
      line-height: 1.7;
      white-space: pre-wrap;
      margin-bottom: 1rem;
    }

    .cl-modal-footer {
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--gray);
    }

    /* ─── EMPTY / LOADING ─── */
    .cl-status {
      padding: 2rem 0;
      color: var(--gray);
      font-size: 0.85rem;
      text-align: center;
    }

    /* ─── FOOTER ─── */
    .cl-footer {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--gray);
      margin-top: 2rem;
    }

    .cl-footer a { color: var(--gray); }
    .cl-footer a:hover { text-decoration: underline; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .cl-listing-thumb { width: 48px; height: 36px; }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<div class="cl-header">
  <a href="index.html" class="cl-logo">&#9774; craigslist<span>republic of bloom · civmc</span></a>
  <div class="cl-header-right">
    <a href="index.html" class="back-link">← back to bloom</a>
  </div>
</div>

<!-- ─── BODY ─── -->
<div class="cl-body">

  <div class="cl-location">
    📍 <strong>Republic of Bloom</strong> &nbsp;·&nbsp; CivMC &nbsp;·&nbsp; <span id="listing-count">loading...</span>
  </div>

  <div class="cl-controls">
    <input class="cl-search" id="search-input" type="text" placeholder="search listings...">
    <div class="cl-filter-btns">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="jobs">jobs</button>
      <button class="filter-btn" data-filter="properties">properties</button>
    </div>
  </div>

  <div id="listings-container">
    <div class="cl-status">loading listings...</div>
  </div>

</div>

<!-- ─── FOOTER ─── */
<div class="cl-footer">
  <a href="index.html">bloom</a> &nbsp;·&nbsp;
  <a href="government.html">government</a> &nbsp;·&nbsp;
  <a href="join.html">residency</a> &nbsp;·&nbsp;
  <a href="https://discord.gg/aV6VM32EZR" target="_blank">discord</a>
  <br><br>
  &copy; 2026 republic of bloom &nbsp;·&nbsp; craigslist
</div>

<!-- ─── MODAL ─── -->
<div class="cl-modal-overlay" id="modal-overlay">
  <div class="cl-modal" id="modal-content">
    <button class="cl-modal-close" id="modal-close">&#x2715;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const GIST_ID = 'c0e6631773692d0c353929162506b70d';
  let allListings = [];
  let activeFilter = 'all';
  let searchQuery = '';

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderListings() {
    const container = document.getElementById('listings-container');
    let filtered = allListings.filter(l => {
      const matchesFilter = activeFilter === 'all' || l.channel === activeFilter;
      const q = searchQuery.toLowerCase();
      const matchesSearch = !q ||
        (l.title || '').toLowerCase().includes(q) ||
        (l.description || '').toLowerCase().includes(q) ||
        (l.display_name || '').toLowerCase().includes(q);
      return matchesFilter && matchesSearch;
    });

    document.getElementById('listing-count').textContent = `${filtered.length} listing${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      container.innerHTML = '<div class="cl-status">no listings found.</div>';
      return;
    }

    const jobs = filtered.filter(l => l.channel === 'jobs');
    const props = filtered.filter(l => l.channel === 'properties');

    let html = '';

    if ((activeFilter === 'all' || activeFilter === 'jobs') && jobs.length > 0) {
      html += `<div class="cl-section-title">jobs</div><div class="cl-listings">`;
      html += jobs.map((l, i) => listingHTML(l, i, 'jobs')).join('');
      html += `</div>`;
    }

    if ((activeFilter === 'all' || activeFilter === 'properties') && props.length > 0) {
      html += `<div class="cl-section-title">properties</div><div class="cl-listings">`;
      html += props.map((l, i) => listingHTML(l, i, 'properties')).join('');
      html += `</div>`;
    }

    container.innerHTML = html;

    container.querySelectorAll('.cl-listing').forEach((el, i) => {
      el.addEventListener('click', () => openModal(filtered[i]));
    });
  }

  function listingHTML(l, i, type) {
    const thumb = l.image
      ? `<div class="cl-listing-thumb"><img src="${l.image}" alt=""></div>`
      : `<div class="cl-listing-thumb" style="font-size:0.6rem;color:#bbb;">no img</div>`;

    return `
      <div class="cl-listing">
        ${thumb}
        <div class="cl-listing-info">
          <div class="cl-listing-title">${l.title || 'Untitled'}</div>
          <div class="cl-listing-meta">
            <span class="cl-listing-tag ${type}">${type}</span>
            <span class="cl-listing-author">${l.display_name || l.author || ''}</span>
            <span class="cl-listing-date">${formatDate(l.timestamp)}</span>
          </div>
        </div>
      </div>`;
  }

  function openModal(l) {
    const overlay = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    const type = l.channel;

    body.innerHTML = `
      <div class="cl-modal-tag">${type} &nbsp;·&nbsp; republic of bloom</div>
      <div class="cl-modal-title">${l.title || 'Untitled'}</div>
      <div class="cl-modal-meta">
        posted by <strong>${l.display_name || l.author || 'unknown'}</strong>
        &nbsp;·&nbsp; ${formatDate(l.timestamp)}
        ${l.thread ? ` &nbsp;·&nbsp; #${l.thread}` : ''}
      </div>
      ${l.image ? `<img class="cl-modal-img" src="${l.image}" alt="${l.title || ''}">` : ''}
      ${l.description ? `<div class="cl-modal-body">${l.description}</div>` : ''}
      <div class="cl-modal-footer">
        interested? reach out on <a href="https://discord.gg/aV6VM32EZR" target="_blank">discord</a>
      </div>
    `;

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderListings();
    });
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderListings();
  });

  async function loadListings() {
    try {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
      const gist = await res.json();
      const data = JSON.parse(gist.files['bloom-data.json'].content);
      allListings = (data.messages || []).filter(m => m.channel === 'jobs' || m.channel === 'properties');
      renderListings();
    } catch (e) {
      document.getElementById('listings-container').innerHTML = '<div class="cl-status">could not load listings.</div>';
      document.getElementById('listing-count').textContent = 'error';
    }
  }

  loadListings();
</script>
</body>
</html>
